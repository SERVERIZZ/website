---
# Deployments are handled by GitHub Actions (.github/workflows/deploy.yml),
# which builds off-server and rsyncs the result to ~/repositories/website.
#
# This file is intentionally restart-ONLY. Building on the server fails here:
# cPanel's deploy context is memory-capped (next build OOMs) and Turbopack
# rejects the CloudLinux node_modules symlink. So if "Deploy HEAD Commit" is
# ever clicked, it just reloads Passenger instead of attempting a build.
deployment:
  tasks:
    - mkdir -p $HOME/repositories/website/tmp && touch $HOME/repositories/website/tmp/restart.txt
