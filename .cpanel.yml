---
# cPanel Git Version Control deployment.
# Runs on "Deploy HEAD Commit": activates this app's Node virtualenv,
# installs deps, builds Next.js, then gracefully restarts Passenger.
#
# Written to be portable — $HOME avoids hardcoding the username and the
# version glob (*/bin/activate) avoids hardcoding the Node major version.
# It assumes the Node.js app has already been created in cPanel with an
# application root of repos/serverizz/website (which creates the venv below).
#
# NOTE: use `npm install`, NOT `npm ci`. The CloudLinux Node.js Selector keeps
# `node_modules` as a symlink into the virtualenv; `npm ci` does `rm -rf
# node_modules` and recreates it as a real folder, which breaks that symlink
# and makes the selector refuse the app. `npm install` writes through the
# symlink and leaves it intact.
deployment:
  tasks:
    - >-
      source $HOME/nodevenv/repos/serverizz/website/*/bin/activate &&
      cd $HOME/repos/serverizz/website &&
      npm install &&
      npm run build &&
      mkdir -p tmp &&
      touch tmp/restart.txt
